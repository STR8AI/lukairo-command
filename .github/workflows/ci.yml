name: CI

on:
  push:
    branches: [main, command]
  pull_request:
    branches: [main, command]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - run: npm run build --if-present
      - run: npm test --if-present
